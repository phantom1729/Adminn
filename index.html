<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakshak Secret Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #111, #1a1a1a, #222);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
        }
        body {
            font-family: 'Poppins', sans-serif; background: var(--bg-gradient); color: #fff;
            margin: 0; padding: 20px; box-sizing: border-box;
        }
        .container { width: 100%; max-width: 900px; margin: 0 auto; text-align: center; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--neon-blue); text-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }
        .refresh-btn {
            background: linear-gradient(45deg, #00d2ff, #0066ff); color: white; border: none;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 20px;
        }
        table { width: 100%; border-collapse: collapse; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px; overflow: hidden; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--glass-border); font-size: 14px; }
        th { background: rgba(0, 210, 255, 0.1); color: var(--neon-blue); font-family: 'Orbitron', sans-serif; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-unused { background: rgba(255, 165, 0, 0.2); color: orange; }
        .status-pending { background: rgba(0, 210, 255, 0.2); color: var(--neon-blue); }
        .status-active { background: rgba(57, 255, 20, 0.2); color: var(--neon-green); }
        .status-expired { background: rgba(255, 0, 85, 0.2); color: #ff0055; }
        .activate-btn {
            background: #222; border: 1px solid var(--neon-green); color: var(--neon-green);
            padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .activate-btn:hover { background: var(--neon-green); color: black; box-shadow: 0 0 10px var(--neon-green); }
    </style>
</head>
<body>

    <div class="container">
        <h1>RAKSHAK COMMAND CENTER</h1>
        <p style="color: #aaa; font-size: 12px;">Live Token Management Panel</p>
        <button class="refresh-btn" onclick="fetchTokens()">🔄 REFRESH DATA</button>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Token (GPay Note)</th>
                        <th>Status</th>
                        <th>Expires At</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tokenTableBody">
                    <tr>
                        <td colspan="6" style="text-align: center; color: #666;">Loading live connections...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Real Live Supabase Connection Bypassing Node.js Server
        const SB_URL = "https://fftlcppkmwwylpsefwss.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmdGxjcHBrbXd3eWxwc2Vmd3NzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMDY4NjYsImV4cCI6MjA5NDc4Mjg2Nn0.NOuInVaqF64Av47jhfnkfgydrYyZ4CVC9WzVWxHRuCE";

        async function fetchTokens() {
            try {
                const response = await fetch(`${SB_URL}/rest/v1/user_licenses?select=*&order=created_at.desc`, {
                    headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
                });
                const tokens = await response.json();
                
                const tbody = document.getElementById('tokenTableBody');
                tbody.innerHTML = '';

                if(tokens.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #888;">No tokens generated yet.</td></tr>`;
                    return;
                }

                tokens.forEach(user => {
                    let expiry = user.expires_at ? new Date(user.expires_at).toLocaleDateString() : 'N/A';
                    let actionButton = user.status === 'unused' ? 
                        `<button class="activate-btn" onclick="activateToken('${user.token}')">🟢 ACTIVATE</button>` : `🔒 Locked`;

                    tbody.innerHTML += `
                        <tr>
                            <td><b>${user.name}</b></td>
                            <td>${user.phone}</td>
                            <td style="font-family: 'Orbitron'; color: #00d2ff; letter-spacing: 1px;">${user.token}</td>
                            <td><span class="status-badge status-${user.status}">${user.status.toUpperCase()}</span></td>
                            <td>${expiry}</td>
                            <td>${actionButton}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
                alert("Database pull failed!");
            }
        }

        async function activateToken(tokenCode) {
            const activatedAt = new Date();
            const expiresAt = new Date();
            expiresAt.setDate(activatedAt.getDate() + 30); // 30 Days Subscription Loop

            try {
                const response = await fetch(`${SB_URL}/rest/v1/user_licenses?token=eq.${tokenCode}`, {
                    method: 'PATCH',
                    headers: { 
                        "apikey": SB_KEY, 
                        "Authorization": `Bearer ${SB_KEY}`,
                        "Content-Type": "application/json",
                        "Prefer": "return=minimal"
                    },
                    body: JSON.stringify({
                        status: 'pending_activation',
                        activated_at: activatedAt.toISOString(),
                        expires_at: expiresAt.toISOString()
                    })
                });

                if(response.ok) {
                    alert(`🚀 Token ${tokenCode} successfully activated for 30 Days!`);
                    fetchTokens(); // Refresh list
                } else {
                    alert("Activation failed!");
                }
            } catch (err) {
                alert("Network error during activation.");
            }
        }

        // Auto Load data when page starts
        window.onload = fetchTokens;
    </script>
</body>
</html>
